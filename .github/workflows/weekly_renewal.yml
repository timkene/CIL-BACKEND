name: Weekly Renewal PDF Generation

on:
  schedule:
    # Every Monday 3:00 AM UTC = 4:00 AM WAT (West Africa Time, UTC+1)
    - cron: '0 3 * * 1'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "duckdb==1.4.0" supabase python-dateutil python-dotenv anthropic reportlab pandas

      - name: Generate renewal PDFs
        env:
          MOTHERDUCK_TOKEN:  ${{ secrets.MOTHERDUCK_TOKEN }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_renewal_pdfs.py
