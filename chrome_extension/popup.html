<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HEALTHINSIGHT</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial; margin: 0; width: 360px; height: 520px; }
      .container { display: flex; flex-direction: column; height: 100%; }
      .header { padding: 8px 12px; font-weight: 600; border-bottom: 1px solid #eee; }
      .messages { flex: 1; padding: 12px; overflow-y: auto; background: #fafafa; }
      .msg { margin-bottom: 10px; max-width: 90%; }
      .msg.user { text-align: right; margin-left: auto; }
      .bubble { display: inline-block; padding: 8px 10px; border-radius: 10px; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
      .msg.user .bubble { background: #e6f0ff; }
      .input { display: flex; padding: 8px; border-top: 1px solid #eee; gap: 6px; }
      input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
      button { padding: 8px 10px; border: none; background: #2563eb; color: #fff; border-radius: 6px; cursor: pointer; }
      .row { display: flex; gap: 8px; align-items: center; }
      .small { font-size: 12px; color: #666; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">HEALTHINSIGHT</div>
      <div class="messages" id="messages"></div>
      <div class="row" style="padding: 6px 8px;">
        <label class="small">Service URL:</label>
        <input id="apiUrl" type="text" placeholder="http://localhost:8787" style="flex:1" />
        <button id="saveUrl" title="Save URL">Save</button>
      </div>
      <div class="input">
        <input id="input" type="text" placeholder="Ask HEALTHINSIGHT..." />
        <button id="send">Send</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
